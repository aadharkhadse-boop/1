server {
  # Non-privileged port so the container can run as a non-root user (common on Kubernetes/ZNAP).
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Lightweight health endpoints for the ZNAP/Kubernetes HTTP probes.
  location = /health { access_log off; add_header Content-Type text/plain; return 200 "ok\n"; }
  location = /health/live { access_log off; add_header Content-Type text/plain; return 200 "ok\n"; }

  # Single-page app: unknown paths fall back to index.html so client-side routing works.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache the hashed, immutable build assets (JS/CSS/fonts/images/encrypted data).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Never cache the HTML shell, so a new deploy is picked up immediately.
  location = /index.html {
    add_header Cache-Control "no-store";
  }
}
